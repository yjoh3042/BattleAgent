<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>배틀 시뮬레이터</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── Design Tokens ─────────────────────────────────────────────── */
:root {
  --bg:     #0a0c14;
  --sf:     #12151f;
  --sf2:    #1a1e2c;
  --sf3:    #222738;
  --bd:     #2a3048;
  --bd2:    #353c58;
  --tx:     #e8eaf4;
  --tx2:    #7b82a0;
  --tx3:    #525878;
  --fire:   #ff6b4a;
  --water:  #4a9eff;
  --forest: #4aff8b;
  --light:  #ffd84a;
  --dark:   #b34aff;
  --accent: #6c5ce7;
  --win:    #4aff8b;
  --lose:   #ff4a6a;
  --grad1:  linear-gradient(135deg, #ff4a6a, #b34aff);
  --font-heading: 'Noto Serif KR', serif;
  --font-body:    'Noto Sans KR', sans-serif;
  --font-mono:    'JetBrains Mono', monospace;
}

/* ─── Reset ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-body); background: var(--bg); color: var(--tx); min-height: 100vh; overflow-x: hidden; }
button { font-family: inherit; cursor: pointer; }
input  { font-family: inherit; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 3px; }

/* ─── Top Bar ────────────────────────────────────────────────────── */
.topbar {
  background: var(--sf);
  border-bottom: 1px solid var(--bd);
  padding: 0 20px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.topbar-brand {
  display: flex; align-items: center; gap: 10px;
}
.topbar-brand h1 {
  font-family: var(--font-heading);
  font-size: 17px;
  font-weight: 700;
  background: var(--grad1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.5px;
}
.topbar-brand .sub {
  font-size: 10px;
  color: var(--tx3);
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
}
.topbar-status {
  display: flex; align-items: center; gap: 8px;
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--tx3);
  transition: background .3s;
}
.status-dot.online { background: var(--win); box-shadow: 0 0 6px var(--win); }
.status-dot.loading { background: var(--light); animation: pulse-dot .8s ease-in-out infinite alternate; }
@keyframes pulse-dot { to { opacity: .3; } }
.status-label { font-size: 10px; color: var(--tx3); font-family: var(--font-mono); }

/* ─── Layout ─────────────────────────────────────────────────────── */
.layout {
  display: grid;
  grid-template-columns: 320px 1fr 340px;
  height: calc(100vh - 52px);
  overflow: hidden;
}

/* ─── Panel Base ─────────────────────────────────────────────────── */
.panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  height: 100%;
}
.panel-left  { border-right: 1px solid var(--bd); background: var(--sf); }
.panel-right { border-left:  1px solid var(--bd); background: var(--sf); }
.panel-center { background: var(--bg); }

.panel-section {
  padding: 10px 12px;
  border-bottom: 1px solid var(--bd);
  flex-shrink: 0;
}
.section-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--tx3);
  margin-bottom: 7px;
  font-family: var(--font-mono);
}

/* ─── Deck Tabs ─────────────────────────────────────────────────── */
.deck-tabs {
  display: flex;
  border-bottom: 1px solid var(--bd);
  flex-shrink: 0;
}
.deck-tab {
  flex: 1;
  padding: 11px 8px;
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  color: var(--tx3);
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  transition: all .18s;
  font-family: var(--font-heading);
}
.deck-tab:hover { color: var(--tx2); background: var(--sf2); }
.deck-tab.active { color: var(--tx); border-bottom-color: var(--accent); background: var(--sf2); }
.deck-tab.ally.active  { border-bottom-color: var(--win); }
.deck-tab.enemy.active { border-bottom-color: var(--lose); }

/* ─── Meta Presets ─────────────────────────────────────────────── */
.meta-select {
  width: 100%;
  background: var(--sf3);
  border: 1px solid var(--bd);
  border-radius: 6px;
  color: var(--tx);
  padding: 6px 10px;
  font-size: 11px;
  outline: none;
  cursor: pointer;
  font-family: var(--font-body);
}
.meta-select:focus { border-color: var(--accent); }
.meta-select option { background: var(--sf2); }

/* ─── Deck Slots ─────────────────────────────────────────────────── */
.deck-slots {
  display: flex;
  gap: 5px;
  min-height: 60px;
  flex-wrap: nowrap;
}
.deck-slot {
  flex: 1;
  min-width: 0;
  height: 60px;
  background: var(--sf3);
  border: 1px dashed var(--bd2);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: var(--tx3);
  position: relative;
  overflow: hidden;
  cursor: default;
  transition: border-color .15s;
}
.deck-slot.filled {
  border-style: solid;
  cursor: pointer;
  background: var(--sf2);
}
.deck-slot.filled:hover { border-color: var(--lose); }
.deck-slot .el-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}
.deck-slot .slot-name {
  font-size: 9px;
  font-weight: 600;
  color: var(--tx);
  text-align: center;
  line-height: 1.3;
  max-width: 52px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  margin-top: 4px;
}
.deck-slot .slot-role {
  font-size: 8px;
  color: var(--tx3);
  font-family: var(--font-mono);
}
.deck-slot .slot-x {
  position: absolute;
  top: 2px; right: 3px;
  font-size: 10px;
  color: var(--tx3);
  line-height: 1;
  font-weight: 700;
  opacity: 0;
  transition: opacity .1s;
}
.deck-slot.filled:hover .slot-x { opacity: 1; color: var(--lose); }

/* ─── Battle Settings ─────────────────────────────────────────────── */
.settings-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.settings-label { font-size: 10px; color: var(--tx3); white-space: nowrap; font-family: var(--font-mono); }
.seed-input {
  background: var(--sf3);
  border: 1px solid var(--bd);
  border-radius: 6px;
  color: var(--tx);
  padding: 5px 8px;
  font-size: 11px;
  width: 80px;
  outline: none;
  font-family: var(--font-mono);
}
.seed-input:focus { border-color: var(--accent); }
.radio-group { display: flex; gap: 3px; }
.radio-btn {
  padding: 4px 10px;
  border-radius: 5px;
  border: 1px solid var(--bd);
  background: var(--sf3);
  color: var(--tx2);
  font-size: 10px;
  cursor: pointer;
  transition: all .15s;
  font-family: var(--font-mono);
}
.radio-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ─── Battle Button ─────────────────────────────────────────────── */
.btn-battle {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  font-weight: 700;
  background: var(--grad1);
  color: #fff;
  font-family: var(--font-heading);
  letter-spacing: 0.5px;
  transition: opacity .2s, transform .1s;
  position: relative;
  overflow: hidden;
}
.btn-battle:disabled { opacity: .35; cursor: not-allowed; }
.btn-battle:not(:disabled):hover { opacity: .88; transform: translateY(-1px); }
.btn-battle:not(:disabled):active { transform: translateY(0); }
.btn-battle .spinner {
  display: none;
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  margin: 0 auto;
}
.btn-battle.loading .btn-label { display: none; }
.btn-battle.loading .spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Filters ─────────────────────────────────────────────────────── */
.filter-row { display: flex; gap: 3px; flex-wrap: wrap; align-items: center; margin-bottom: 5px; }
.filter-row:last-child { margin-bottom: 0; }
.filter-label { font-size: 9px; color: var(--tx3); width: 24px; flex-shrink: 0; font-family: var(--font-mono); }
.fbtn {
  padding: 3px 7px;
  border-radius: 5px;
  border: 1px solid var(--bd);
  background: var(--sf3);
  color: var(--tx2);
  font-size: 10px;
  cursor: pointer;
  transition: all .12s;
  font-family: var(--font-mono);
}
.fbtn:hover { border-color: currentColor; }
.fbtn.active { border-color: currentColor; }
.fbtn.f-fire   { color: var(--fire);   } .fbtn.f-fire.active   { background: rgba(255,107,74,.18); }
.fbtn.f-water  { color: var(--water);  } .fbtn.f-water.active  { background: rgba(74,158,255,.18); }
.fbtn.f-forest { color: var(--forest); } .fbtn.f-forest.active { background: rgba(74,255,139,.18); }
.fbtn.f-light  { color: var(--light);  } .fbtn.f-light.active  { background: rgba(255,216,74,.18); }
.fbtn.f-dark   { color: var(--dark);   } .fbtn.f-dark.active   { background: rgba(179,74,255,.18); }
.fbtn.f-role.active { background: rgba(108,92,231,.2); border-color: var(--accent); color: var(--tx); }
.fbtn.f-star { color: var(--light); }
.fbtn.f-star.active { background: rgba(255,216,74,.15); border-color: var(--light); }
.btn-clear { padding: 4px 12px; border-radius: 6px; border: 1px solid var(--bd); background: var(--sf3); color: var(--lose); font-size: 11px; transition: all .15s; margin-left: auto; }
.btn-clear:hover { background: rgba(255,74,106,.15); border-color: var(--lose); }
.search-input {
  width: 100%;
  background: var(--sf3);
  border: 1px solid var(--bd);
  border-radius: 6px;
  color: var(--tx);
  padding: 5px 9px;
  font-size: 11px;
  outline: none;
  font-family: var(--font-body);
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--tx3); }

/* ─── Character List ─────────────────────────────────────────────── */
.char-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 10px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.char-card {
  background: var(--sf2);
  border: 1px solid var(--bd);
  border-radius: 7px;
  padding: 6px 9px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all .12s;
  user-select: none;
  position: relative;
  overflow: hidden;
}
.char-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}
.char-card.fire::before   { background: var(--fire);   }
.char-card.water::before  { background: var(--water);  }
.char-card.forest::before { background: var(--forest); }
.char-card.light::before  { background: var(--light);  }
.char-card.dark::before   { background: var(--dark);   }
.char-card:hover { background: var(--sf3); border-color: var(--bd2); }
.char-card.in-active {
  border-color: var(--accent);
  background: rgba(108,92,231,.12);
}
.char-card.in-active:hover { border-color: var(--lose); background: rgba(255,74,106,.08); }
.char-card.in-other { opacity: .5; pointer-events: none; }
.char-el {
  width: 20px; height: 20px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
}
.char-el.fire   { background: rgba(255,107,74,.2); }
.char-el.water  { background: rgba(74,158,255,.2); }
.char-el.forest { background: rgba(74,255,139,.2); }
.char-el.light  { background: rgba(255,216,74,.2); }
.char-el.dark   { background: rgba(179,74,255,.2); }
.char-info { flex: 1; min-width: 0; }
.char-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--tx);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  font-family: var(--font-heading);
}
.char-meta { font-size: 9px; color: var(--tx2); display: flex; gap: 5px; margin-top: 1px; font-family: var(--font-mono); }
.char-role { font-size: 10px; color: var(--tx2); font-family: var(--font-mono); flex-shrink: 0; }
.char-count {
  position: absolute;
  top: 4px; right: 6px;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  opacity: 0;
}
.char-card.in-active .char-count { opacity: 1; }
.no-results { color: var(--tx3); font-size: 12px; text-align: center; padding: 24px; }

/* ─── Center Panel ─────────────────────────────────────────────── */
.center-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* Result Banner */
.result-banner {
  border-radius: 10px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border: 1px solid var(--bd);
  animation: slide-down .3s ease-out;
}
@keyframes slide-down { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
.result-banner.win  { background: rgba(74,255,139,.08); border-color: rgba(74,255,139,.3); }
.result-banner.lose { background: rgba(255,74,106,.08); border-color: rgba(255,74,106,.3); }
.result-banner.time { background: rgba(255,216,74,.08); border-color: rgba(255,216,74,.3); }
.result-label {
  font-family: var(--font-heading);
  font-size: 20px;
  font-weight: 700;
}
.result-banner.win  .result-label { color: var(--win);  }
.result-banner.lose .result-label { color: var(--lose); }
.result-banner.time .result-label { color: var(--light); }
.result-meta { font-size: 11px; color: var(--tx2); font-family: var(--font-mono); }
.result-meta span { color: var(--tx); font-weight: 600; }

/* Battlefield */
.battlefield {
  background: var(--sf);
  border: 1px solid var(--bd);
  border-radius: 12px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.bf-row-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--tx3);
  margin-bottom: 6px;
  font-family: var(--font-mono);
}
.bf-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* Unit Card */
.unit-card {
  background: var(--sf2);
  border: 1px solid var(--bd);
  border-radius: 9px;
  padding: 9px 10px;
  width: 148px;
  min-width: 0;
  flex-shrink: 0;
  position: relative;
  transition: border-color .2s, box-shadow .2s, opacity .3s;
  animation: unit-appear .35s ease-out both;
}
@keyframes unit-appear {
  from { opacity:0; transform:scale(.92) translateY(6px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}
.unit-card.dead {
  opacity: .38;
  filter: grayscale(.8);
}
.unit-card.active {
  border-color: var(--light) !important;
  box-shadow: 0 0 0 2px rgba(255,216,74,.18), 0 0 16px rgba(255,216,74,.12);
  animation: unit-appear .35s ease-out both, active-pulse 1.8s ease-in-out infinite;
}
@keyframes active-pulse {
  0%,100% { box-shadow: 0 0 0 2px rgba(255,216,74,.18), 0 0 16px rgba(255,216,74,.12); }
  50%      { box-shadow: 0 0 0 3px rgba(255,216,74,.35), 0 0 24px rgba(255,216,74,.22); }
}
.unit-card.fire   { border-color: rgba(255,107,74,.25);   }
.unit-card.water  { border-color: rgba(74,158,255,.25);   }
.unit-card.forest { border-color: rgba(74,255,139,.25);   }
.unit-card.light  { border-color: rgba(255,216,74,.25);   }
.unit-card.dark   { border-color: rgba(179,74,255,.25);   }

.unit-el-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  border-radius: 9px 9px 0 0;
}
.fire   .unit-el-bar { background: var(--fire);   }
.water  .unit-el-bar { background: var(--water);  }
.forest .unit-el-bar { background: var(--forest); }
.light  .unit-el-bar { background: var(--light);  }
.dark   .unit-el-bar { background: var(--dark);   }

.unit-header {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 6px;
  margin-top: 4px;
}
.unit-el-icon { font-size: 12px; }
.unit-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--tx);
  flex: 1;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  font-family: var(--font-heading);
}
.unit-dead-icon { font-size: 12px; }

/* HP Bar */
.hp-track {
  background: var(--sf3);
  border-radius: 3px;
  height: 6px;
  overflow: hidden;
  position: relative;
  margin-bottom: 2px;
}
.hp-fill {
  height: 100%;
  border-radius: 3px;
  transition: width .5s ease;
  background: var(--win);
}
.hp-fill.mid  { background: var(--light); }
.hp-fill.low  { background: var(--lose); }
.hp-fill.dead { background: var(--tx3); }

/* Barrier Bar */
.barrier-track {
  background: var(--sf3);
  border-radius: 3px;
  height: 3px;
  overflow: hidden;
  margin-bottom: 4px;
}
.barrier-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--water);
  transition: width .5s ease;
  opacity: .8;
}

.hp-text {
  font-size: 9px;
  color: var(--tx2);
  font-family: var(--font-mono);
  display: flex;
  justify-content: space-between;
  margin-bottom: 5px;
}

/* Buff Dots */
.buff-row {
  display: flex;
  gap: 3px;
  flex-wrap: wrap;
  min-height: 8px;
}
.buff-dot {
  width: 7px; height: 7px;
  border-radius: 2px;
  title: '';
  cursor: default;
}
.buff-dot.is-buff    { background: rgba(74,255,139,.7); }
.buff-dot.is-debuff  { background: rgba(255,74,106,.7); }
.buff-dot.is-barrier { background: rgba(74,158,255,.7); }
.buff-dot.is-cc      { background: rgba(255,216,74,.7); }

/* SP Bar */
.sp-bar-section {
  background: var(--sf);
  border: 1px solid var(--bd);
  border-radius: 10px;
  padding: 10px 14px;
}
.sp-label { font-size: 9px; color: var(--tx3); font-family: var(--font-mono); letter-spacing: 1px; margin-bottom: 6px; }
.sp-row { display: flex; align-items: center; gap: 8px; }
.sp-side { flex: 1; min-width: 0; }
.sp-name { font-size: 10px; color: var(--tx2); margin-bottom: 3px; font-family: var(--font-mono); }
.sp-track {
  height: 8px;
  background: var(--sf3);
  border-radius: 4px;
  overflow: hidden;
}
.sp-fill {
  height: 100%;
  border-radius: 4px;
  transition: width .4s ease;
}
.sp-fill.ally  { background: linear-gradient(90deg, var(--accent), #8b7cf8); }
.sp-fill.enemy { background: linear-gradient(90deg, var(--lose), var(--fire)); }
.sp-val {
  font-size: 11px;
  font-family: var(--font-mono);
  font-weight: 600;
  color: var(--tx);
  min-width: 20px;
  text-align: center;
}
.sp-divider { font-size: 10px; color: var(--tx3); }

/* ─── Timeline ─────────────────────────────────────────────────── */
.timeline-section {
  background: var(--sf);
  border: 1px solid var(--bd);
  border-radius: 10px;
  padding: 10px 14px;
}
.timeline-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.timeline-turn {
  font-size: 11px;
  color: var(--tx2);
  font-family: var(--font-mono);
}
.timeline-turn span { color: var(--tx); font-weight: 600; }
.timeline-slider {
  -webkit-appearance: none;
  width: 100%;
  height: 5px;
  border-radius: 3px;
  background: var(--sf3);
  outline: none;
  cursor: pointer;
  margin-bottom: 8px;
  background-image: linear-gradient(var(--accent), var(--accent));
  background-size: 0% 100%;
  background-repeat: no-repeat;
}
.timeline-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--tx);

}

</style>
</head>
<body>

<!-- ─── Top Bar ─────────────────────────────────────────────────── -->

  <div class="topbar-brand">
    <h1>배틀 시뮬레이터</h1>

<!-- ─── Layout ─────────────────────────────────────────────────── -->
<div class="layout">

  <!-- ══ LEFT PANEL ══════════════════════════════════════════════ -->
  <div class="panel panel-left">

    <!-- Deck Tabs -->
    <div class="deck-tabs">
      <button class="deck-tab ally active" id="tabAlly" onclick="switchDeckTab('ally')">아군 (Ally)</button>

    <!-- Meta Presets -->
    <div class="panel-section">
      <div class="section-label">메타 프리셋</div>
      <select class="meta-select" id="metaSelect" onchange="applyMetaPreset(this.value)">

      </select>
    </div>

    <!-- Deck Slots -->
    <div class="panel-section">
      <div class="section-label">덱 슬롯 (<span id="deckCount">0</span>/5)</div>

      </div>

    <!-- Battle Settings -->
    <div class="panel-section">

    <div class="panel-section">

    <!-- Filters -->
    <div class="panel-section">
      <div class="filter-row">
        <span class="filter-label">속성</span>
        <button class="fbtn f-fire"   data-el="fire"   onclick="toggleFilter(this,'el')">🔥 화</button>
        <button class="fbtn f-water"  data-el="water"  onclick="toggleFilter(this,'el')">💧 수</button>
        <button class="fbtn f-forest" data-el="forest" onclick="toggleFilter(this,'el')">🌿 목</button>
        <button class="fbtn f-light"  data-el="light"  onclick="toggleFilter(this,'el')">✨ 광</button>
        <button class="fbtn f-dark"   data-el="dark"   onclick="toggleFilter(this,'el')">🌙 암</button>
      </div>
      <div class="filter-row">
        <span class="filter-label">역할</span>
        <button class="fbtn f-role" data-role="attacker"  onclick="toggleFilter(this,'role')">ATK</button>
        <button class="fbtn f-role" data-role="defender"  onclick="toggleFilter(this,'role')">DEF</button>
        <button class="fbtn f-role" data-role="magician"  onclick="toggleFilter(this,'role')">MAG</button>
        <button class="fbtn f-role" data-role="supporter" onclick="toggleFilter(this,'role')">SUP</button>
        <button class="fbtn f-role" data-role="healer"    onclick="toggleFilter(this,'role')">HLR</button>
      </div>
      <div class="filter-row">
        <span class="filter-label">성급</span>
        <button class="fbtn f-star" data-star="1"   onclick="toggleFilter(this,'star')">1★</button>
        <button class="fbtn f-star" data-star="2"   onclick="toggleFilter(this,'star')">2★</button>
        <button class="fbtn f-star" data-star="3"   onclick="toggleFilter(this,'star')">3★</button>
        <button class="fbtn f-star" data-star="3.5" onclick="toggleFilter(this,'star')">3.5★</button>
      </div>
      <input class="search-input" type="text" id="searchInput" placeholder="캐릭터 검색..." oninput="renderCharList()">
    </div>

    <!-- Character List -->
    <div class="char-list" id="charList">
      <div class="no-results">캐릭터 로딩 중...</div>
    </div>

  </div>
  <!-- ══ END LEFT ═════════════════════════════════════════════════ -->

  <!-- ══ CENTER PANEL ════════════════════════════════════════════ -->
  <div class="panel panel-center">
    <div class="center-scroll" id="centerScroll">
      <div class="placeholder" id="placeholder">
        <div class="ph-icon">⚔</div>
        <div class="ph-title">전투 준비 완료</div>
        <div class="ph-sub">아군과 적군 각 5명을 선택한 후<br>배틀 시작 버튼을 눌러주세요</div>
      </div>
      <!-- battle content injected here by JS -->
    </div>
  </div>
  <!-- ══ END CENTER ════════════════════════════════════════════════ -->

  <!-- ══ RIGHT PANEL ═════════════════════════════════════════════ -->
  <div class="panel panel-right">
    <div class="right-scroll" id="rightPanel">
      <div class="placeholder">
        <div class="ph-icon">📜</div>
        <div class="ph-title">이벤트 로그</div>
        <div class="ph-sub">배틀을 실행하면<br>턴별 이벤트가 표시됩니다</div>
      </div>
    </div>
  </div>
  <!-- ══ END RIGHT ════════════════════════════════════════════════ -->

</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════════════
var allChars = [];
var metaTeams = [];
var allyDeck  = [];   // array of char objects
var enemyDeck = [];
var activeDeckTab = 'ally';  // 'ally' | 'enemy'
var deckType = 'offense';
var activeFilters = { el: new Set(), role: new Set(), star: new Set() };

var battleData = null;   // raw API response
var currentTurnIdx = 0;
var isPlaying = false;
var playInterval = null;
var playSpeed = 1;       // 0.5 | 1 | 2
var PLAY_BASE_MS = 700;

// ═══════════════════════════════════════════════════════════════════
// Element helpers
// ═══════════════════════════════════════════════════════════════════
var EL_ICON  = { fire:'🔥', water:'💧', forest:'🌿', light:'✨', dark:'🌙' };
var EL_CLASS = { fire:'fire', water:'water', forest:'forest', light:'light', dark:'dark' };
var ROLE_ABBR = { attacker:'ATK', defender:'DEF', magician:'MAG', supporter:'SUP', healer:'HLR' };

function elClass(el) { return EL_CLASS[el] || ''; }
function elIcon(el)  { return EL_ICON[el]  || '?'; }
function roleAbbr(r) { return ROLE_ABBR[r] || r; }

function fmtNum(n) {
  if (n == null) return '0';
  return Math.round(n).toLocaleString('ko-KR');
}

// ═══════════════════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════════════════
function setStatus(state, label) {
  var dot = document.getElementById('statusDot');
  var lbl = document.getElementById('statusLabel');
  dot.className = 'status-dot ' + state;
  lbl.textContent = label;
}

async function loadInitialData() {
  setStatus('loading', '서버 연결 중...');
  try {
    var [cRes, mRes] = await Promise.all([
      fetch('/api/characters'),
      fetch('/api/meta-teams')
    ]);
    if (!cRes.ok || !mRes.ok) throw new Error('서버 응답 오류');
    allChars  = await cRes.json();
    metaTeams = await mRes.json();
    renderMetaSelect();
    renderCharList();
    setStatus('online', '온라인 (' + allChars.length + '캐릭터)');
  } catch(e) {
    setStatus('', '서버 오프라인');
    showToast('서버에 연결할 수 없습니다. api_server.py가 실행 중인지 확인하세요.', 'error');
    // Fallback: render empty
    renderCharList();
  }
}

// ═══════════════════════════════════════════════════════════════════
// Meta Select
// ═══════════════════════════════════════════════════════════════════
function renderMetaSelect() {
  var sel = document.getElementById('metaSelect');
  metaTeams.forEach(function(t) {
    var opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = t.id + ' — ' + t.name + '  ' + (t.description || '');
    sel.appendChild(opt);
  });
}

function applyMetaPreset(teamId) {
  if (!teamId) return;
  var team = metaTeams.find(function(t) { return t.id === teamId; });
  if (!team || !team.character_ids) return;
  var deck = activeDeckTab === 'ally' ? allyDeck : enemyDeck;
  // Clear and fill
  deck.length = 0;
  team.character_ids.slice(0, 5).forEach(function(cid) {
    var c = allChars.find(function(x) { return x.id === cid; });
    if (c) deck.push(c);
  });
  renderDeckSlots();
  renderCharList();
  // Reset select
  document.getElementById('metaSelect').value = '';
}

// ═══════════════════════════════════════════════════════════════════
// Deck Tab
// ═══════════════════════════════════════════════════════════════════
function switchDeckTab(tab) {
  activeDeckTab = tab;
  document.getElementById('tabAlly').classList.toggle('active', tab === 'ally');
  document.getElementById('tabEnemy').classList.toggle('active', tab === 'enemy');
  renderDeckSlots();
  renderCharList();
}

// ═══════════════════════════════════════════════════════════════════
// Deck Slots
// ═══════════════════════════════════════════════════════════════════
function getCurrentDeck() {
  return activeDeckTab === 'ally' ? allyDeck : enemyDeck;
}

function renderDeckSlots() {
  var deck = getCurrentDeck();
  var container = document.getElementById('deckSlots');
  document.getElementById('deckCount').textContent = deck.length;
  container.innerHTML = '';
  for (var i = 0; i < 5; i++) {
    var slot = document.createElement('div');
    if (i < deck.length) {
      var c = deck[i];
      var ec = elClass(c.element);
      slot.className = 'deck-slot filled';
      slot.title = 'Click to remove';
      slot.innerHTML =
        '<div class="el-bar" style="background:var(--' + ec + ')"></div>' +
        '<div class="slot-name">' + escHtml(c.name) + '</div>' +
        '<div class="slot-role">' + roleAbbr(c.role) + '</div>' +
        '<div class="slot-x">✕</div>';
      (function(idx){ slot.onclick = function(){ removeFromDeck(idx); }; })(i);
    } else {
      slot.className = 'deck-slot';
      slot.innerHTML = '<span style="font-size:9px;color:var(--tx3)">' + (i+1) + '</span>';
    }
    container.appendChild(slot);
  }
}

function removeFromDeck(idx) {
  var deck = getCurrentDeck();
  deck.splice(idx, 1);
  renderDeckSlots();
  renderCharList();
}

function addToDeck(charId) {
  var deck = getCurrentDeck();
  if (deck.length >= 5) { showToast('슬롯이 가득 찼습니다 (최대 5명)', 'info'); return; }
  var c = allChars.find(function(x) { return x.id === charId; });
  if (!c) return;
  if (deck.find(function(x) { return x.id === charId; })) {
    removeFromDeck(deck.findIndex(function(x) { return x.id === charId; }));
    return;
  }
  deck.push(c);
  renderDeckSlots();
  renderCharList();
}

// ═══════════════════════════════════════════════════════════════════
// Filters
// ═══════════════════════════════════════════════════════════════════
function toggleFilter(btn, type) {
  var key = type === 'el' ? btn.dataset.el : type === 'role' ? btn.dataset.role : btn.dataset.star;
  if (activeFilters[type].has(key)) {
    activeFilters[type].delete(key);
    btn.classList.remove('active');
  } else {
    activeFilters[type].add(key);
    btn.classList.add('active');
  }
  renderCharList();
}

function clearDeck() {
  if (activeDeckTab === 'ally') {
    allyDeck = [];
  } else {
    enemyDeck = [];
  }
  renderDeckSlots();
  renderCharList();
}

// ═══════════════════════════════════════════════════════════════════
// Character List
// ═══════════════════════════════════════════════════════════════════
function renderCharList() {
  var search = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  var filtered = allChars.filter(function(c) {
    if (activeFilters.el.size   > 0 && !activeFilters.el.has(c.element))   return false;
    if (activeFilters.role.size > 0 && !activeFilters.role.has(c.role))    return false;
    if (activeFilters.star.size > 0 && !activeFilters.star.has(c.star))    return false;
    if (search && !c.name.toLowerCase().includes(search))                  return false;
    return true;
  });

  var container = document.getElementById('charList');
  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">검색 결과 없음</div>';
    return;
  }

  var frag = document.createDocumentFragment();
  filtered.forEach(function(c) {
    var inAlly  = allyDeck.find(function(x) { return x.id === c.id; });
    var inEnemy = enemyDeck.find(function(x) { return x.id === c.id; });
    var isActive = activeDeckTab === 'ally' ? !!inAlly : !!inEnemy;
    var isOther  = activeDeckTab === 'ally' ? !!inEnemy : !!inAlly;
    var ec = elClass(c.element);

    var card = document.createElement('div');
    card.className = 'char-card ' + ec + (isActive ? ' in-active' : '') + (isOther ? ' in-other' : '');
    card.onclick = function() { addToDeck(c.id); };

    var st = c.stats || {};
    card.innerHTML =
      '<div class="char-el ' + ec + '">' + elIcon(c.element) + '</div>' +
      '<div class="char-info">' +
        '<div class="char-name">' + escHtml(c.name) + '</div>' +
        '<div class="char-meta">' +
          '<span>HP ' + fmtNum(st.hp) + '</span>' +
          '<span>ATK ' + fmtNum(st.atk) + '</span>' +
          '<span>SPD ' + (st.spd || 0) + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="char-role">' + roleAbbr(c.role) + '</div>' +
      '<div class="char-count">✓</div>';

    frag.appendChild(card);
  });
  container.innerHTML = '';
  container.appendChild(frag);
}

// ═══════════════════════════════════════════════════════════════════
// Battle Execution
// ═══════════════════════════════════════════════════════════════════
async function runBattle() {
  if (allyDeck.length === 0) { showToast('아군 덱을 선택해주세요', 'info'); return; }
  if (enemyDeck.length === 0) { showToast('적군 덱을 선택해주세요', 'info'); return; }

  var btn = document.getElementById('btnBattle');
  btn.classList.add('loading');
  btn.disabled = true;
  setStatus('loading', '전투 중...');

  stopPlayback();

  try {
    var seed = parseInt(document.getElementById('seedInput').value);
    if (isNaN(seed)) seed = 42;

    var res = await fetch('/api/battle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        ally_ids:  allyDeck.map(function(c) { return c.id; }),
        enemy_ids: enemyDeck.map(function(c) { return c.id; }),
        seed:      seed,
        deck_type: deckType
      })
    });

    if (!res.ok) {
      var err = await res.json().catch(function() { return {detail: res.statusText}; });
      throw new Error(err.detail || '배틀 오류');
    }

    var data = await res.json();
    battleData = data;
    setStatus('online', '배틀 완료 — ' + (data.turn_count || 0) + '턴');
    initReplay(data);

  } catch(e) {
    showToast('배틀 오류: ' + e.message, 'error');
    setStatus('online', '오류');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

// ═══════════════════════════════════════════════════════════════════
// Replay Init
// ═══════════════════════════════════════════════════════════════════
function initReplay(data) {
  var turns = (data.turns && data.turns.turns) ? data.turns.turns : (data.turns || []);
  if (!turns || turns.length === 0) {
    showToast('배틀 데이터가 없습니다', 'error');
    return;
  }

  currentTurnIdx = 0;

  // Build center
  var center = document.getElementById('centerScroll');
  center.innerHTML = buildCenterHTML(data, turns);

  // Init slider
  var slider = document.getElementById('timelineSlider');
  slider.max = turns.length - 1;
  slider.value = 0;
  slider.oninput = function() {
    currentTurnIdx = parseInt(this.value);
    showTurn(currentTurnIdx, turns);
    updateSliderFill(this);
  };

  // Speed buttons
  document.querySelectorAll('.speed-btn').forEach(function(btn) {
    btn.onclick = function() {
      document.querySelectorAll('.speed-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      playSpeed = parseFloat(btn.dataset.speed);
      if (isPlaying) { stopPlayback(); startPlayback(turns); }
    };
  });

  showTurn(0, turns);
  updateSliderFill(slider);
}

function buildCenterHTML(data, turns) {
  // Determine result
  var lastTurn = turns[turns.length - 1];
  var resultVal = (lastTurn && lastTurn.result) ? lastTurn.result : (data.result || '');
  var isWin  = resultVal === 'ally_win';
  var isLose = resultVal === 'enemy_win';
  var resultClass = isWin ? 'win' : (isLose ? 'lose' : 'time');
  var resultText  = isWin ? '아군 승리' : (isLose ? '적군 승리' : '시간 초과');

  // Collect unit IDs from first turn
  var firstTurn = turns[0];
  var unitIds = Object.keys(firstTurn.units || {});
  var allyIds  = unitIds.filter(function(id) { return firstTurn.units[id].side === 'ally'; });
  var enemyIds = unitIds.filter(function(id) { return firstTurn.units[id].side === 'enemy'; });

  function buildUnitCard(uid, unit) {
    var ec = elClass(unit.element);
    return '<div class="unit-card ' + ec + '" id="uc_' + uid + '" data-uid="' + uid + '">' +
      '<div class="unit-el-bar"></div>' +
      '<div class="unit-header">' +
        '<span class="unit-el-icon">' + elIcon(unit.element) + '</span>' +
        '<span class="unit-name">' + escHtml(unit.name) + '</span>' +
        '<span class="unit-dead-icon" id="dead_' + uid + '" style="display:none">☠</span>' +
      '</div>' +
      '<div class="hp-track"><div class="hp-fill" id="hpf_' + uid + '" style="width:100%"></div></div>' +
      '<div class="barrier-track"><div class="barrier-fill" id="brf_' + uid + '" style="width:0%"></div></div>' +
      '<div class="hp-text">' +
        '<span id="hpv_' + uid + '">—</span>' +
        '<span id="hppct_' + uid + '">100%</span>' +
      '</div>' +
      '<div class="buff-row" id="buffs_' + uid + '"></div>' +
    '</div>';
  }

  var allyCards  = allyIds.map(function(id) { return buildUnitCard(id, firstTurn.units[id]); }).join('');
  var enemyCards = enemyIds.map(function(id) { return buildUnitCard(id, firstTurn.units[id]); }).join('');

  return '<div class="result-banner ' + resultClass + '" id="resultBanner">' +
      '<div>' +
        '<div class="result-label">' + resultText + '</div>' +
        '<div class="result-meta">총 <span>' + turns.length + '</span>턴</div>' +
      '</div>' +
      '<div class="result-meta" style="text-align:right">' +
        'Seed <span>' + (document.getElementById('seedInput').value || '42') + '</span><br>' +
        (deckType === 'offense' ? '공격 덱' : '방어 덱') +
      '</div>' +
    '</div>' +

    '<div class="battlefield" id="battlefield">' +
      '<div>' +
        '<div class="bf-row-label">🛡 적군 (Enemy)</div>' +
        '<div class="bf-row" id="rowEnemy">' + enemyCards + '</div>' +
      '</div>' +
      '<div style="border-top:1px solid var(--bd);margin:0 -14px;opacity:.5"></div>' +
      '<div>' +
        '<div class="bf-row-label">⚔ 아군 (Ally)</div>' +
        '<div class="bf-row" id="rowAlly">' + allyCards + '</div>' +
      '</div>' +
    '</div>' +

    '<div class="sp-bar-section">' +
      '<div class="sp-label">SP 게이지</div>' +
      '<div class="sp-row">' +
        '<div class="sp-side">' +
          '<div class="sp-name">아군</div>' +
          '<div class="sp-track"><div class="sp-fill ally" id="spAlly" style="width:0%"></div></div>' +
        '</div>' +
        '<div class="sp-val" id="spAllyVal">0</div>' +
        '<div class="sp-divider">/</div>' +
        '<div class="sp-val" id="spEnemyVal">0</div>' +
        '<div class="sp-side">' +
          '<div class="sp-name" style="text-align:right">적군</div>' +
          '<div class="sp-track"><div class="sp-fill enemy" id="spEnemy" style="width:0%"></div></div>' +
        '</div>' +
      '</div>' +
    '</div>' +

    '<div class="timeline-section">' +
      '<div class="timeline-header">' +
        '<div class="timeline-turn" id="timelineTurnLabel">턴 <span>1</span> / ' + turns.length + '</div>' +
        '<div class="timeline-turn" id="timelineTime">T=<span>0.0</span></div>' +
      '</div>' +
      '<input type="range" class="timeline-slider" id="timelineSlider" min="0" max="' + (turns.length-1) + '" value="0">' +
      '<div class="playback-row">' +
        '<button class="pb-btn" onclick="seekTurn(0, true)" title="처음">⏮</button>' +
        '<button class="pb-btn" onclick="stepTurn(-1)" title="이전">◀</button>' +
        '<button class="pb-btn play" id="btnPlay" onclick="togglePlayback()" title="재생/정지">▶</button>' +
        '<button class="pb-btn" onclick="stepTurn(1)" title="다음">▶▶</button>' +
        '<button class="pb-btn" onclick="seekTurn(-1, true)" title="마지막">⏭</button>' +
        '<div class="speed-btns">' +
          '<button class="speed-btn" data-speed="0.5">0.5×</button>' +
          '<button class="speed-btn active" data-speed="1">1×</button>' +
          '<button class="speed-btn" data-speed="2">2×</button>' +
        '</div>' +
      '</div>' +
    '</div>';
}

// ═══════════════════════════════════════════════════════════════════
// Show Turn
// ═══════════════════════════════════════════════════════════════════
function showTurn(idx, turnsArg) {
  var turns = turnsArg || ((battleData && battleData.turns && battleData.turns.turns) ? battleData.turns.turns : (battleData && battleData.turns) || []);
  if (!turns || !turns[idx]) return;
  var turn = turns[idx];

  // Update slider label
  var lblEl = document.getElementById('timelineTurnLabel');
  if (lblEl) lblEl.innerHTML = '턴 <span>' + (idx+1) + '</span> / ' + turns.length;
  var timeEl = document.getElementById('timelineTime');
  if (timeEl) timeEl.innerHTML = 'T=<span>' + (turn.t || 0).toFixed(2) + '</span>';

  var slider = document.getElementById('timelineSlider');
  if (slider) { slider.value = idx; updateSliderFill(slider); }

  // Update units
  var units = turn.units || {};
  Object.keys(units).forEach(function(uid) {
    var u = units[uid];
    var hpRatio = u.hp_ratio != null ? u.hp_ratio : (u.max_hp > 0 ? u.hp / u.max_hp : 0);
    var hpPct = Math.max(0, Math.min(100, hpRatio * 100));

    var hpFill = document.getElementById('hpf_' + uid);
    var brFill = document.getElementById('brf_' + uid);
    var hpVal  = document.getElementById('hpv_' + uid);
    var hpPctEl = document.getElementById('hppct_' + uid);
    var deadEl = document.getElementById('dead_' + uid);
    var card   = document.getElementById('uc_' + uid);
    var buffsEl = document.getElementById('buffs_' + uid);

    if (hpFill) {
      hpFill.style.width = hpPct.toFixed(1) + '%';
      hpFill.className = 'hp-fill' + (hpPct <= 0 || !u.is_alive ? ' dead' : hpPct < 30 ? ' low' : hpPct < 60 ? ' mid' : '');
    }
    if (brFill) {
      var brPct = u.max_hp > 0 ? Math.min(100, (u.barrier_hp / u.max_hp) * 100) : 0;
      brFill.style.width = brPct.toFixed(1) + '%';
    }
    if (hpVal)  hpVal.textContent  = fmtNum(u.hp) + ' / ' + fmtNum(u.max_hp);
    if (hpPctEl) hpPctEl.textContent = hpPct.toFixed(0) + '%';
    if (deadEl) deadEl.style.display = u.is_alive ? 'none' : 'inline';
    if (card) {
      card.classList.toggle('dead', !u.is_alive);
      card.classList.toggle('active', uid === turn.active);
    }

    // Buffs
    if (buffsEl && u.buffs) {
      buffsEl.innerHTML = u.buffs.map(function(b) {
        var cls = b.is_debuff ? 'is-debuff' : (b.name && b.name.toLowerCase().includes('barrier') ? 'is-barrier' : 'is-buff');
        return '<div class="buff-dot ' + cls + '" title="' + escHtml(b.name || '') + ' (' + b.remaining + '턴)"></div>';
      }).join('');
      // CC dot
      if (u.cc) buffsEl.innerHTML += '<div class="buff-dot is-cc" title="행동불능"></div>';
    }
  });

  // SP bars
  var maxSP = 10;
  var spAVal = turn.ally_sp || 0;
  var spEVal = turn.enemy_sp || 0;
  var spAllyEl = document.getElementById('spAlly');
  var spEnemyEl = document.getElementById('spEnemy');
  var spAVEl = document.getElementById('spAllyVal');
  var spEVEl = document.getElementById('spEnemyVal');
  if (spAllyEl)  spAllyEl.style.width  = Math.min(100, (spAVal/maxSP)*100) + '%';
  if (spEnemyEl) spEnemyEl.style.width = Math.min(100, (spEVal/maxSP)*100) + '%';
  if (spAVEl)    spAVEl.textContent    = spAVal;
  if (spEVEl)    spEVEl.textContent    = spEVal;

  // Right panel
  renderTurnLog(turn, idx, turns.length);
}

// ═══════════════════════════════════════════════════════════════════
// Right Panel Log
// ═══════════════════════════════════════════════════════════════════
function renderTurnLog(turn, idx, totalTurns) {
  var panel = document.getElementById('rightPanel');

  // Skill type badge
  var stypeClass = turn.skill_type || 'normal';
  var stypeLabel = { normal:'일반', active:'액티브', ultimate:'궁극기', cc_skip:'CC', round_start:'라운드' }[stypeClass] || stypeClass;

  // Events HTML
  var eventsHTML = '';
  var events = turn.events || [];
  if (events.length === 0) {
    eventsHTML = '<div class="no-results" style="padding:12px">이벤트 없음</div>';
  } else {
    events.forEach(function(ev) {
      var icon, cls, txt;
      switch(ev.type) {
        case 'damage':
          icon = '🗡'; cls = 'evt-damage';
          txt = escHtml(ev.src || '?') + ' → ' + escHtml(ev.dst || '?') + ': <strong>' + fmtNum(ev.value) + ' dmg</strong>';
          if (ev.is_crit) txt += '<span class="crit-tag">CRIT</span>';
          break;
        case 'heal':
          icon = '💚'; cls = 'evt-heal';
          txt = escHtml(ev.src || '?') + ' → ' + escHtml(ev.dst || '?') + ': <strong>' + fmtNum(ev.value) + ' 회복</strong>';
          break;
        case 'buff':
          icon = '🔵'; cls = 'evt-buff';
          txt = escHtml(ev.label || '버프') + (ev.dst ? ' → ' + escHtml(ev.dst) : '');
          break;
        case 'debuff':
          icon = '🔴'; cls = 'evt-debuff';
          txt = escHtml(ev.label || '디버프') + (ev.dst ? ' → ' + escHtml(ev.dst) : '');
          break;
        case 'death':
          icon = '☠'; cls = 'evt-death';
          txt = escHtml(ev.dst || ev.src || '?') + ' 사망';
          break;
        case 'revive':
          icon = '✨'; cls = 'evt-revive';
          txt = escHtml(ev.dst || ev.src || '?') + ' 부활 — HP ' + fmtNum(ev.value);
          break;
        case 'ultimate':
          icon = '💥'; cls = 'evt-ultimate';
          txt = escHtml(ev.src || '?') + ' 궁극기 사용';
          break;
        default:
          icon = '·'; cls = '';
          txt = escHtml(ev.label || ev.type || '');
      }
      eventsHTML += '<div class="log-event ' + cls + '">' +
        '<span class="evt-icon">' + icon + '</span>' +
        '<span class="evt-text">' + txt + '</span>' +
        (ev.value && ev.type !== 'damage' && ev.type !== 'heal' ? '<span class="evt-val">' + fmtNum(ev.value) + '</span>' : '') +
      '</div>';
    });
  }

  // Log lines
  var logLines = (turn.log || []).map(function(l) {
    return '<div class="log-line">' + escHtml(l) + '</div>';
  }).join('');

  // Summary (last turn)
  var summaryHTML = '';
  if (idx === totalTurns - 1 && battleData) {
    summaryHTML = buildSummaryHTML();
  }

  panel.innerHTML =
    '<div class="log-turn-header">' +
      '<div class="log-turn-label">턴 ' + (idx+1) + (turn.active ? ' — ' + escHtml(nameOf(turn.active)) : '') + '</div>' +
      '<div class="log-skill-meta">' +
        (turn.skill || '—') +
        ' <span class="stype ' + stypeClass + '">' + stypeLabel + '</span>' +
        (turn.extra ? ' <span style="color:var(--light);font-size:9px">+추가</span>' : '') +
      '</div>' +
    '</div>' +
    '<div class="log-sp-row">' +
      'SP: 아군 <span class="sp-ally-val">' + (turn.ally_sp || 0) + '</span> / ' +
      '적군 <span class="sp-enemy-val">' + (turn.enemy_sp || 0) + '</span>' +
    '</div>' +
    '<div class="log-events">' + eventsHTML + '</div>' +
    (logLines ? '<div class="log-lines-section">' +
      '<button class="log-lines-toggle" id="logToggle" onclick="toggleLogLines()">' +
        '<span class="toggle-arrow">▶</span> 원시 로그 (' + (turn.log || []).length + '줄)' +
      '</button>' +
      '<div class="log-lines-body" id="logLinesBody">' + logLines + '</div>' +
    '</div>' : '') +
    summaryHTML;
}

function nameOf(unitId) {
  if (!battleData || !battleData.turns) return unitId;
  var turns = battleData.turns.turns || battleData.turns;
  if (!turns || !turns[0]) return unitId;
  var u = turns[0].units[unitId];
  return u ? u.name : unitId;
}

function toggleLogLines() {
  var btn  = document.getElementById('logToggle');
  var body = document.getElementById('logLinesBody');
  if (!btn || !body) return;
  var open = body.classList.toggle('open');
  btn.classList.toggle('open', open);
}

function buildSummaryHTML() {
  if (!battleData) return '';
  var turns = (battleData.turns && battleData.turns.turns) ? battleData.turns.turns : (battleData.turns || []);
  var lastTurn = turns[turns.length - 1];
  var resultVal = (lastTurn && lastTurn.result) ? lastTurn.result : (battleData.result || '');
  var isWin = resultVal === 'ally_win';

  // Survivors
  var survivors = [];
  var allUnits = battleData.allies.concat(battleData.enemies);
  allUnits.forEach(function(u) {
    if (u.is_alive) {
      survivors.push(u);
    }
  });

  // Damage totals per unit from events
  var dmgMap = {};
  turns.forEach(function(t) {
    (t.events || []).forEach(function(ev) {
      if (ev.type === 'damage' && ev.src) {
        dmgMap[ev.src] = (dmgMap[ev.src] || 0) + (ev.value || 0);
      }
    });
  });
  var dmgEntries = Object.keys(dmgMap).map(function(id) {
    return { id: id, name: nameOf(id), dmg: dmgMap[id] };
  }).sort(function(a,b) { return b.dmg - a.dmg; });

  var survivorRows = survivors.map(function(u) {
    var side = u.id.endsWith('_e') ? 'enemy' : 'ally';
    var hpPct = u.max_hp > 0 ? Math.round(u.hp / u.max_hp * 100) : 0;
    return '<div class="survivor-item">' +
      '<div class="survivor-side-dot ' + side + '"></div>' +
      '<span style="flex:1;color:var(--tx)">' + escHtml(u.name || u.id) + '</span>' +
      '<span style="color:var(--tx2);font-size:9px">' + fmtNum(u.hp) + ' (' + hpPct + '%)</span>' +
    '</div>';
  }).join('');

  var dmgRows = dmgEntries.slice(0, 8).map(function(e) {
    return '<div class="summary-row">' +
      '<span class="sname">' + escHtml(e.name) + '</span>' +
      '<span class="sval">' + fmtNum(e.dmg) + '</span>' +
    '</div>';
  }).join('');

  return '<div class="summary-section">' +
    '<div class="summary-title">📊 배틀 요약</div>' +
    '<div class="summary-row">' +
      '<span class="sname">결과</span>' +
      '<span class="sval" style="color:' + (isWin ? 'var(--win)' : 'var(--lose)') + '">' +
        (isWin ? '아군 승리' : (resultVal === 'enemy_win' ? '적군 승리' : '시간 초과')) +
      '</span>' +
    '</div>' +
    '<div class="summary-row"><span class="sname">총 턴수</span><span class="sval">' + turns.length + '</span></div>' +
    '<div style="margin:6px 0 4px;font-size:9px;color:var(--tx3);font-family:var(--font-mono);letter-spacing:1px">생존자</div>' +
    (survivorRows || '<div style="font-size:10px;color:var(--tx3)">없음</div>') +
    '<div style="margin:8px 0 4px;font-size:9px;color:var(--tx3);font-family:var(--font-mono);letter-spacing:1px">딜량 순위</div>' +
    dmgRows +
  '</div>';
}

// ═══════════════════════════════════════════════════════════════════
// Playback Controls
// ═══════════════════════════════════════════════════════════════════
function getTurns() {
  if (!battleData) return [];
  return (battleData.turns && battleData.turns.turns) ? battleData.turns.turns : (battleData.turns || []);
}

function seekTurn(idx, relEnd) {
  var turns = getTurns();
  if (turns.length === 0) return;
  if (relEnd) {
    currentTurnIdx = idx < 0 ? turns.length - 1 : 0;
  } else {
    currentTurnIdx = Math.max(0, Math.min(turns.length - 1, idx));
  }
  showTurn(currentTurnIdx, turns);
}

function stepTurn(delta) {
  var turns = getTurns();
  currentTurnIdx = Math.max(0, Math.min(turns.length - 1, currentTurnIdx + delta));
  showTurn(currentTurnIdx, turns);
}

function togglePlayback() {
  if (isPlaying) stopPlayback();
  else startPlayback();
}

function startPlayback(turnsArg) {
  var turns = turnsArg || getTurns();
  if (turns.length === 0) return;
  isPlaying = true;
  var playBtn = document.getElementById('btnPlay');
  if (playBtn) playBtn.textContent = '⏸';

  var interval = Math.round(PLAY_BASE_MS / playSpeed);
  if (currentTurnIdx >= turns.length - 1) currentTurnIdx = 0;

  playInterval = setInterval(function() {
    if (currentTurnIdx >= turns.length - 1) {
      stopPlayback();
      return;
    }
    currentTurnIdx++;
    showTurn(currentTurnIdx, turns);
  }, interval);
}

function stopPlayback() {
  isPlaying = false;
  if (playInterval) { clearInterval(playInterval); playInterval = null; }
  var playBtn = document.getElementById('btnPlay');
  if (playBtn) playBtn.textContent = '▶';
}

function updateSliderFill(slider) {
  var pct = slider.max > 0 ? (slider.value / slider.max) * 100 : 0;
  slider.style.backgroundSize = pct + '% 100%';
}

// ═══════════════════════════════════════════════════════════════════
// Toast
// ═══════════════════════════════════════════════════════════════════
function showToast(msg, type) {
  var container = document.getElementById('toastContainer');
  var toast = document.createElement('div');
  toast.className = 'toast ' + (type || 'info');
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(function() {
    toast.style.transition = 'opacity .3s';
    toast.style.opacity = '0';
    setTimeout(function() { container.removeChild(toast); }, 320);
  }, 3500);
}

// ═══════════════════════════════════════════════════════════════════
// Utility
// ═══════════════════════════════════════════════════════════════════
function escHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ═══════════════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════════════
renderDeckSlots();
loadInitialData();
</script>
